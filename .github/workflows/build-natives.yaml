name: Build Natives (All Platforms)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-natives:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x64 }
          - { os: macos-26, name: macos-arm64 }
          - { os: macos-26-intel, name: macos-x64 }
          - { os: windows-latest, name: windows-x64 }
    runs-on: ${{ matrix.os }}
    env:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Download and Setup jextract
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            URL="https://download.java.net/java/early_access/jextract/25/2/openjdk-25-jextract+2-4_windows-x64_bin.tar.gz"
            curl -L $URL -o jextract.zip
            unzip jextract.zip
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            URL="https://download.java.net/java/early_access/jextract/25/2/openjdk-25-jextract+2-4_linux-x64_bin.tar.gz"
            curl -L $URL | tar -xz
          else
            URL="https://download.java.net/java/early_access/jextract/25/2/openjdk-25-jextract+2-4_macos-x64_bin.tar.gz"
            curl -L $URL | tar -xz
          fi
          
          echo "$(pwd)/jextract/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build Natives
        run: ./gradlew publishAllPublicationsToZnotchillRepository -PcmakeBuildType=Release

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luau-natives-${{ matrix.name }}
          path: native/build/libs/*.jar