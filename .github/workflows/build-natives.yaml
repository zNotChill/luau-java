name: Build Natives (All Platforms)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-natives:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x64 }
          - { os: macos-26, name: macos-arm64 }
          - { os: macos-26-intel, name: macos-x64 }
          - { os: windows-latest, name: windows-x64 }
    runs-on: ${{ matrix.os }}
    env:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build Natives
        run: ./gradlew :native:publish -PcmakeBuildType=Release

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luau-natives-${{ matrix.name }}
          path: native/build/libs/*.jar